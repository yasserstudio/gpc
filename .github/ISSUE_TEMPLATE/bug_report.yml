name: Bug Report
description: Report a bug in GPC
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: GPC Version
      description: Run `gpc --version` to get this
      placeholder: "0.9.44"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version` to get this
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - CI/CD (GitHub Actions)
        - CI/CD (Other)
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: The GPC command that triggered the bug
      placeholder: "gpc releases upload app.aab --track beta"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste the terminal output (run with `--verbose` for more detail)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config details
