name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Dry-run publish
        run: |
          for pkg in packages/auth packages/config packages/plugin-sdk packages/api packages/core packages/cli plugins/plugin-ci; do
            echo "--- dry-run: $pkg ---"
            (cd "$pkg" && npm publish --dry-run 2>&1) || exit 1
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6789308 # v1
        with:
          publish: pnpm release
          createGithubReleases: false
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Generate SBOM
        if: steps.changesets.outputs.published == 'true'
        run: |
          npx @cyclonedx/cdxgen -o sbom.json -t javascript
          echo "SBOM generated: $(jq '.components | length' sbom.json) components"

      - name: Upload SBOM artifact
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Verify published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Waiting 30s for npm registry propagation..."
          sleep 30
          for pkg in @gpc-cli/auth @gpc-cli/config @gpc-cli/plugin-sdk @gpc-cli/api @gpc-cli/core @gpc-cli/cli @gpc-cli/plugin-ci; do
            echo "--- verifying: $pkg ---"
            npm view "$pkg" version || echo "WARNING: $pkg not yet available"
          done
