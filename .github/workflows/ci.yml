name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  socket-security:
    name: Socket Security
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Socket CLI
        run: npm install -g socket@latest

      - name: Socket Security Scan
        # SOCKET_CLI_ORG_SLUG is required in CI: a fresh runner has no local
        # Socket config file, so the CLI cannot resolve the org slug from the
        # token alone. Without this, the CLI falls back to the display name
        # ("Yasser's studio" — with apostrophe + space) and produces a 404
        # "Organization not found" on every run.
        #
        # The slug used here ("yasser-s-studio") is the one the current
        # SOCKET_SECURITY_API_TOKEN is authorized for — visible in the passing
        # "Socket Security: Project Report" dashboard URL:
        #   https://socket.dev/dashboard/org/yasser-s-studio/sbom/...
        #
        # Note: there may be a newer Socket org at /org/yasserstudio without
        # hyphens, but the current token is not provisioned for it. Swap the
        # slug here if the token is rotated for the new org.
        run: socket ci --repo gpc
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_TOKEN }}
          SOCKET_CLI_ORG_SLUG: yasser-s-studio

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
