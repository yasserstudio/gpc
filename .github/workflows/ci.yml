name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  socket-security:
    name: Socket Security
    runs-on: ubuntu-latest
    # Skip on Dependabot PRs: they run under the Dependabot secret scope, so
    # SOCKET_SECURITY_API_TOKEN is empty and `socket ci` fails with an auth
    # error. Dependency Review + Socket's own PR alerts already cover dep PRs.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Socket CLI
        run: npm install -g socket@1.1.76

      - name: Socket Security Scan
        # SOCKET_CLI_ORG_SLUG is required in CI: a fresh runner has no local
        # Socket config file, so the CLI cannot resolve the org slug from the
        # token alone. Without this, the CLI falls back to the display name
        # ("Yasser's studio" — with apostrophe + space) and produces a 404
        # "Organization not found" on every run.
        #
        # The slug used here ("yasser-s-studio") is the one the current
        # SOCKET_SECURITY_API_TOKEN is authorized for — visible in the passing
        # "Socket Security: Project Report" dashboard URL:
        #   https://socket.dev/dashboard/org/yasser-s-studio/sbom/...
        #
        # Note: there may be a newer Socket org at /org/yasserstudio without
        # hyphens, but the current token is not provisioned for it. Swap the
        # slug here if the token is rotated for the new org.
        run: socket ci --repo gpc
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_TOKEN }}
          SOCKET_CLI_ORG_SLUG: yasser-s-studio

  deepsec:
    name: Deep Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Deep security scan
        working-directory: .deepsec
        run: |
          pnpm install --ignore-scripts
          npx deepsec scan
          npx deepsec process
          npx deepsec revalidate
          npx deepsec export --format json --out deepsec-results.json
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deepsec-findings
          path: .deepsec/deepsec-results.json
          retention-days: 30

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    name: check (node ${{ matrix.node-version }})
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lockfile integrity hash
        if: matrix.node-version == 22
        run: shasum -a 256 pnpm-lock.yaml

      - name: Audit production dependencies
        if: matrix.node-version == 22
        # npm retired the legacy audit endpoints (HTTP 410) that `pnpm audit`
        # still calls, so a failed run may be the endpoint outage rather than a
        # real advisory. Fail on genuine high-severity findings; treat only the
        # endpoint outage as a warning (Socket Security + Dependency Review gate
        # dependency vulnerabilities on PRs).
        run: |
          if out=$(pnpm audit --prod --audit-level=high 2>&1); then
            echo "$out"
          else
            echo "$out"
            if echo "$out" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE"; then
              echo "::warning::pnpm audit endpoint returned an error (npm retired the legacy audit endpoints). Skipping; dependency vulnerabilities remain gated by Socket Security and Dependency Review."
              exit 0
            fi
            exit 1
          fi

      - name: Lint
        if: matrix.node-version == 22
        run: pnpm lint

      - name: Typecheck
        if: matrix.node-version == 22
        run: pnpm typecheck

      - name: Format check
        if: matrix.node-version == 22
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
