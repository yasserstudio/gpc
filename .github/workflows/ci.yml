name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  socket-security:
    name: Socket Security
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Socket CLI
        run: npm install -g socket@1.1.76

      - name: Socket Security Scan
        # SOCKET_CLI_ORG_SLUG is required in CI: a fresh runner has no local
        # Socket config file, so the CLI cannot resolve the org slug from the
        # token alone. Without this, the CLI falls back to the display name
        # ("Yasser's studio" — with apostrophe + space) and produces a 404
        # "Organization not found" on every run.
        #
        # The slug used here ("yasser-s-studio") is the one the current
        # SOCKET_SECURITY_API_TOKEN is authorized for — visible in the passing
        # "Socket Security: Project Report" dashboard URL:
        #   https://socket.dev/dashboard/org/yasser-s-studio/sbom/...
        #
        # Note: there may be a newer Socket org at /org/yasserstudio without
        # hyphens, but the current token is not provisioned for it. Swap the
        # slug here if the token is rotated for the new org.
        run: socket ci --repo gpc
        env:
          SOCKET_SECURITY_API_TOKEN: ${{ secrets.SOCKET_SECURITY_API_TOKEN }}
          SOCKET_CLI_ORG_SLUG: yasser-s-studio

  deepsec:
    name: Deep Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Deep security scan
        run: |
          npx deepsec scan
          npx deepsec process
          npx deepsec revalidate
          npx deepsec export --format json --out deepsec-results.json
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deepsec-findings
          path: deepsec-results.json
          retention-days: 30

  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    name: check (node ${{ matrix.node-version }})
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lockfile integrity hash
        if: matrix.node-version == 22
        run: shasum -a 256 pnpm-lock.yaml

      - name: Audit production dependencies
        if: matrix.node-version == 22
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        if: matrix.node-version == 22
        run: pnpm lint

      - name: Typecheck
        if: matrix.node-version == 22
        run: pnpm typecheck

      - name: Format check
        if: matrix.node-version == 22
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
