<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .header { fill: #161b22; }
    .border { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .title { fill: rgba(255,255,255,0.28); font-family: 'Inter', system-ui, sans-serif; font-size: 11px; }
    .prompt { fill: #4d95f1; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
    .cmd { fill: #e6edf3; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; }
    .label { fill: #7ee787; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; }
    .ok { fill: #3fb950; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .warn { fill: #d29922; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .err { fill: #f85149; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .val { fill: #79c0ff; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .dim { fill: #8b949e; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .muted { fill: #484f58; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
    .section { fill: #e6edf3; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }
    .divider { fill: rgba(255,255,255,0.1); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  </style>

  <!-- Window -->
  <rect class="bg" x="0" y="0" width="680" height="480" rx="12"/>
  <rect class="border" x="0" y="0" width="680" height="480" rx="12"/>

  <!-- Header bar -->
  <rect class="header" x="1" y="1" width="678" height="38" rx="12"/>
  <rect class="header" x="1" y="27" width="678" height="12"/>
  <line x1="1" y1="39" x2="679" y2="39" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle class="dot-red" cx="20" cy="20" r="6"/>
  <circle class="dot-yellow" cx="40" cy="20" r="6"/>
  <circle class="dot-green" cx="60" cy="20" r="6"/>
  <text class="title" x="635" y="24" text-anchor="end">terminal</text>

  <!-- Command -->
  <text class="prompt" x="24" y="72">$</text>
  <text class="cmd" x="40" y="72">gpc preflight app-release.aab</text>

  <!-- File info -->
  <text class="dim" x="24" y="100">Scanning app-release.aab</text>
  <text class="muted" x="260" y="100">(14.2 MB · version code 142)</text>

  <!-- Divider -->
  <text class="divider" x="24" y="118">────────────────────────────────────────────────────</text>

  <!-- Scanner results -->
  <text class="label" x="24" y="146">SCANNERS</text>

  <!-- manifest -->
  <text class="ok" x="24" y="172">✓</text>
  <text class="dim" x="44" y="172">manifest</text>
  <text class="muted" x="180" y="172">targetSdk 35 · minSdk 24 · not debuggable</text>

  <!-- permissions -->
  <text class="warn" x="24" y="196">⚠</text>
  <text class="warn" x="44" y="196">permissions</text>
  <text class="warn" x="180" y="196">ACCESS_FINE_LOCATION — requires privacy policy</text>

  <!-- native-libs -->
  <text class="ok" x="24" y="220">✓</text>
  <text class="dim" x="44" y="220">native-libs</text>
  <text class="muted" x="180" y="220">arm64-v8a, armeabi-v7a, x86_64</text>

  <!-- metadata -->
  <text class="ok" x="24" y="244">✓</text>
  <text class="dim" x="44" y="244">metadata</text>
  <text class="muted" x="180" y="244">title, descriptions, screenshots present</text>

  <!-- secrets -->
  <text class="err" x="24" y="268">✗</text>
  <text class="err" x="44" y="268">secrets</text>
  <text class="err" x="180" y="268">Hardcoded API key found in res/values/strings.xml</text>

  <!-- billing -->
  <text class="ok" x="24" y="292">✓</text>
  <text class="dim" x="44" y="292">billing</text>
  <text class="muted" x="180" y="292">Google Play Billing only</text>

  <!-- privacy -->
  <text class="ok" x="24" y="316">✓</text>
  <text class="dim" x="44" y="316">privacy</text>
  <text class="muted" x="180" y="316">no third-party tracking SDKs</text>

  <!-- policy -->
  <text class="ok" x="24" y="340">✓</text>
  <text class="dim" x="44" y="340">policy</text>
  <text class="muted" x="180" y="340">no policy flags</text>

  <!-- size -->
  <text class="ok" x="24" y="364">✓</text>
  <text class="dim" x="44" y="364">size</text>
  <text class="muted" x="180" y="364">14.2 MB — within limits</text>

  <!-- Divider -->
  <text class="divider" x="24" y="390">────────────────────────────────────────────────────</text>

  <!-- Summary -->
  <text class="section" x="24" y="414">Result</text>
  <text class="ok" x="100" y="414">7 passed</text>
  <text class="warn" x="200" y="414">1 warning</text>
  <text class="err" x="320" y="414">1 error</text>

  <!-- Suggestion -->
  <text class="dim" x="24" y="440">Fix the error above before uploading to avoid rejection.</text>

  <!-- Cursor -->
  <text class="prompt" x="24" y="466">$</text>
  <text class="val" x="40" y="466" style="fill: #4d95f1;">▋</text>
</svg>
